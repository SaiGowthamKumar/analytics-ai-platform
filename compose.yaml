services:
  backend:
    build:
      context: .
      dockerfile: deployment/Dockerfile.backend
      target: development
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENVIRONMENT: development
      APP_DOCS_ENABLED: "true"
      APP_LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - backend_pip_cache:/home/appuser/.cache/pip
    networks:
      - analytics_development
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    command: sh -c "if [ ! -d node_modules/react ]; then npm ci; fi; npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - analytics_development
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5173/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: analytics_platform
      POSTGRES_USER: analytics_platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - analytics_development
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_platform -d analytics_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - analytics_development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  analytics_development:
    driver: bridge

volumes:
  backend_pip_cache:
  frontend_node_modules:
  postgres_data:
  redis_data:
