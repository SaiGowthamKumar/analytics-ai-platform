name: Continuous Integration

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install --group dev .

      - name: Ruff lint
        run: ruff check backend tests

      - name: Ruff format check
        run: ruff format --check backend tests

      - name: Black format check
        run: black --check backend tests

      - name: isort import check
        run: isort --check-only backend tests

      - name: MyPy type check
        run: mypy backend

      - name: Pytest with coverage
        run: pytest --cov=backend --cov-report=xml:coverage.xml

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: warn

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: ESLint and TypeScript
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Vitest with coverage
        run: npm run test:coverage

      - name: Frontend production build
        run: npm run build

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/cobertura-coverage.xml
          if-no-files-found: warn
